<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ANDA LOGO</title>
  <link rel="stylesheet" href="/static/css/style_LoginCnpj.css?v=20">
</head>
<body>

  <div class="bg-effects"></div>

  <main class="wrap">
    <section class="modal" id="modalCard">
      <h1 class="title">
        <span class="title-orange">ANDA</span><span class="title-white">LOGO</span>
      </h1>

      <form class="form" id="form" novalidate>

        <div class="mode" id="modeClient">

          <p class="subtitle">Digite seu nome e entre na fila em segundos.</p>

          <div class="inputWrap">
            <span class="inputIcon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                <path d="M20 21a8 8 0 10-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>

            <input
              id="nome"
              type="text"
              class="input"
              placeholder="Seu nome"
              maxlength="40"
              autocomplete="name"
            >
          </div>

          <p class="inputHint">Seu nome será usado apenas para identificação na fila.</p>
          <p class="error" id="error"></p>

          <button type="submit" class="btn" id="btnClient">Entrar na fila</button>

        </div>

      </form>

    </section>
  </main>

  <footer class="siteFooter">
    <span class="footerBrand">
      <span class="footerOrange">ANDA</span>
      <span class="footerWhite">LOGO</span>
    </span>
    <span class="footerCopy">© 2026</span>
  </footer>

  <script src="/static/js/config.js?v=10"></script>
  <script src="/static/js/app_login_cliente.js?v=10"></script>
</body>
</html>
